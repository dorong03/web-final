<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게임 개발 포트폴리오</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>백민승 포트폴리오</h1>

    <nav>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#skills">Skills</a>
    </nav>

    <button id="darkBtn">🌙</button>
</header>

<section class="hero hidden">
    <h2>게임 개발자 포트폴리오</h2>
    <p>Unity 개발 공부 중</p>
</section>

<section id="about" class="hidden">
    <h2>About Me</h2>
    <p>
        컴퓨터공학 전공 학생입니다.
        Unity를 이용한 게임 개발을 공부하고 있습니다.
    </p>
</section>

<section id="projects" class="hidden">

    <h2>Projects</h2>

    <div class="buttons">
        <button class="filter-btn" data-filter="all">전체</button>
        <button class="filter-btn" data-filter="unity">Unity</button>
        <button class="filter-btn" data-filter="personal">개인</button>
    </div>

    <div class="project unity">
        2D 퍼즐 플랫포머 게임 [ 랫 루프 ]
    </div>

    <div class="project unity personal">
        2D 농장 시뮬레이션 게임
    </div>

    <div class="project personal">
        모바일 퍼즐 게임
    </div>

</section>

<section id="skills" class="hidden">

    <h2>Skills</h2>

    <div class="skill">
        <p>C#</p>
        <div class="bar">
            <div class="fill csharp"></div>
        </div>
    </div>

    <div class="skill">
        <p>Unity</p>
        <div class="bar">
            <div class="fill unitybar"></div>
        </div>
    </div>

    <div class="skill">
        <p>git</p>
        <div class="bar">
            <div class="fill git"></div>
        </div>
    </div>
</section>

<footer>
    <p>GitHub : github.com/yourid</p>
</footer>

<script src="script.js"></script>

</body>
</html>
